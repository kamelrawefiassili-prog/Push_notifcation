<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح أخطاء إشعارات الدفع (Vercel)</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background-color: #f4f6f9; padding: 4px; text-align: center; }
        .test-card { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 5px; }
        textarea { width: 100%; height: 100px; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; resize: none; }
        button { background-color: #e04f5f; color: white; border: none; padding: 14px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #c93b4a; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="test-card">
    <h2>🧪 مصحح أخطاء إرسال الإشعارات</h2>
    <p style="color: #666; font-size: 13px;">اكتب نص التجربة واضغط على الزر لإرسال إشعار فوري عبر Vercel.</p>
    
    <div id="statusMessage" class="status"></div>

    <form id="pushForm">
        <textarea id="pushText" placeholder="اكتب نص الإشعار هنا..."></textarea>
        <button type="submit" id="submitBtn">إرسال وفحص الأخطاء 📣</button>
    </form>
</div>

<script>
    document.getElementById('pushForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const pushText = document.getElementById('pushText').value;
        const statusDiv = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        if (!pushText.trim()) {
            statusDiv.innerHTML = "<div style='color: orange; font-weight: bold;'>⚠️ الرجاء كتابة نص الإشعار أولاً!</div>";
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الإرسال...";
        statusDiv.innerHTML = "<div style='color: #333;'>⏳ جاري إرسال الطلب لـ OneSignal...</div>";

        try {
            const response = await fetch('/api/send-push', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ push_text: pushText })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                statusDiv.innerHTML = `<div style='color: green; font-weight: bold; background: #e6ffe6; padding: 10px; border-radius: 5px;'>${result.message}</div>`;
            } else {
                statusDiv.innerHTML = `
                    <div style='color: red; text-align: right; background: #fff3f3; padding: 15px; border-radius: 5px; border: 1px solid #cc0000;'>
                        <strong>❌ تفاصيل الرد الصادر:</strong><br>
                        <pre style='background: #222; color: #fff; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; text-align: left;' dir='ltr'>${JSON.stringify(result.details || result.error, null, 2)}</pre>
                    </div>`;
            }
        } catch (error) {
            statusDiv.innerHTML = `
                <div style='color: red; text-align: right; background: #fff3f3; padding: 15px; border-radius: 5px; border: 1px solid #cc0000;'>
                    <strong>❌ خطأ في الاتصال بالشبكة:</strong><br>
                    <code>${error.message}</code>
                </div>`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "إرسال وفحص الأخطاء 📣";
        }
    });
</script>

</body>
</html>
